{% extends 'base.html' %}

{% block content %}
  <section class="page-header">
    <h2>Entrar</h2>
  </section>

  <div class="login-page">
    <form class="login-card" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="form-actions">
        <button class="btn" type="submit">Entrar</button>
        <a class="btn btn-secondary" href="{% url 'home' %}">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
